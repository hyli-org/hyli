name: Build verifier worker

on:
  workflow_call:
    inputs:
      verifier:
        required: true
        type: string
        description: "Verifier name (sp1, risc0, jolt, reth)"

env:
  AR_REPO_LOCATION: "europe-west1-docker.pkg.dev"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    name: ${{ inputs.verifier }}-verifier
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            europe-west1-docker.pkg.dev/hyli-shared-all/hyli/hyli-${{ inputs.verifier }}-verifier
            ghcr.io/hyli-org/hyli-${{ inputs.verifier }}-verifier
          tags: |
            type=sha
            type=ref,event=branch

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/493106494045/locations/global/workloadIdentityPools/hyli-all-pool/providers/hyli-github-provider"
          service_account: "ci-builder-sa@hyli-shared-all.iam.gserviceaccount.com"

      - name: Authenticate docker on GCP
        run: |
          gcloud auth configure-docker ${{ env.AR_REPO_LOCATION }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          file: .github/docker/Dockerfile.${{ inputs.verifier }}-verifier
          context: .
          build-args: |
            DEP_IMAGE=europe-west1-docker.pkg.dev/hyli-shared-all/hyli/hyli-dependencies:main
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
